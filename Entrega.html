<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Entrega - Tempero da Casa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #F4F0EC;
            --bg-card: #FFFFFF;
            --text-main: #2D1B14;
            --text-muted: #6D4C41;
            --primary: #A67C52;
            --success: #4CAF50;
            --danger: #D32F2F;
            --warning: #FF9800;
            --pix-bg: #E8F5E9;
            --pix-text: #2E7D32;
            --collect-bg: #FFF3E0;
            --collect-text: #E65100;
            --nav-bg: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        [data-theme="dark"] {
            --bg-body: #120E0B;
            --bg-card: #1C1612;
            --text-main: #FDFBF9;
            --text-muted: #BCAAA4;
            --nav-bg: #1C1612;
            --shadow: 0 -4px 20px rgba(0,0,0,0.4);
            --pix-bg: rgba(76, 175, 80, 0.15);
            --pix-text: #81C784;
            --collect-bg: rgba(255, 152, 0, 0.15);
            --collect-text: #FFB74D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.2s, color 0.2s; }

        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 80px; overflow-x: hidden; }

        /* HEADER */
        header { background: var(--bg-card); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .header-title { font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        .theme-btn { background: none; border: none; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; }

        /* VIEWS */
        .view { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.5px; }

        /* CARDS DE PEDIDO */
        .driver-card { background: var(--bg-card); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); border: 1px solid rgba(166, 124, 82, 0.1); position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
        .order-id { font-size: 1.3rem; font-weight: 700; color: var(--text-main); }
        .order-time { font-size: 0.85rem; color: var(--text-muted); background: var(--bg-body); padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        
        .client-info { margin-bottom: 15px; }
        .client-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 2px; }
        .client-address { font-size: 0.95rem; color: var(--text-muted); line-height: 1.4; }
        
        .payment-box { padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .payment-box.paid { background: var(--pix-bg); color: var(--pix-text); border: 1px solid var(--pix-text); }
        .payment-box.collect { background: var(--collect-bg); color: var(--collect-text); border: 1px solid var(--collect-text); }
        .pay-val { font-size: 1.2rem; font-weight: 700; }

        /* BOTÕES DE AÇÃO */
        .btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(166, 124, 82, 0.3); }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-icon { background: var(--bg-body); color: var(--text-main); padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; font-weight: 600; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-icon i { font-size: 1.2rem; color: var(--primary); }

        .items-toggle { background: none; border: none; color: var(--text-muted); width: 100%; text-align: left; padding: 10px 0; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; border-top: 1px dashed rgba(0,0,0,0.1); margin-top: 10px; }
        .items-list { display: none; padding: 10px; background: var(--bg-body); border-radius: 10px; margin-bottom: 15px; }
        .items-list.open { display: block; }
        .items-list li { font-size: 0.85rem; margin-bottom: 5px; color: var(--text-muted); list-style: none; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .items-list li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); display: flex; box-shadow: var(--shadow); z-index: 100; border-top: 1px solid rgba(0,0,0,0.05); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-item i { font-size: 1.4rem; transition: transform 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-3px); }
        
        .badge { background: var(--danger); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; position: absolute; top: 8px; margin-left: 20px; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; color: var(--primary); opacity: 0.5; margin-bottom: 15px; }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="header-title"><i class="fa-solid fa-motorcycle"></i> Tempero da Casa - Entrega</div>
        <button class="theme-toggle theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    </header>

    <main id="view-coletas" class="view active">
        <div class="section-title">Pedidos na Cozinha / Prontos <span id="count-coleta" style="float: right; color: var(--primary);">0</span></div>
        <div id="list-coletas">
            <div class="empty-state"><i class="fa-solid fa-box-open"></i><p>Nenhum pedido aguardando coleta no momento.</p></div>
        </div>
    </main>

    <main id="view-entregas" class="view">
        <div class="section-title">Minhas Entregas em Rota <span id="count-entrega" style="float: right; color: var(--primary);">0</span></div>
        <div id="list-entregas">
            <div class="empty-state"><i class="fa-solid fa-map-location-dot"></i><p>Você não tem entregas ativas agora.</p></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('coletas')" id="tab-coletas" style="position: relative;">
            <i class="fa-solid fa-store"></i>
            <span>Coletas</span>
            <span class="badge" id="badge-coleta" style="display: none;">0</span>
        </div>
        <div class="nav-item" onclick="switchTab('entregas')" id="tab-entregas" style="position: relative;">
            <i class="fa-solid fa-motorcycle"></i>
            <span>Em Rota</span>
            <span class="badge" id="badge-entrega" style="display: none;">0</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9NyBVa1Ha_42kwos09SV5VTN7NQWqHjM",
            authDomain: "tempero-da-casa-a2217.firebaseapp.com",
            projectId: "tempero-da-casa-a2217",
            storageBucket: "tempero-da-casa-a2217.firebasestorage.app",
            messagingSenderId: "92967322711",
            appId: "1:92967322711:web:88d151d9345f9191a8cf12"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- NAVEGAÇÃO E TEMA ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${tab}`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            window.scrollTo(0,0);
        };

        window.toggleTheme = () => {
            const target = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            document.querySelector('.theme-toggle i').className = target === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        };

        window.toggleItems = (id) => {
            document.getElementById(`items-${id}`).classList.toggle('open');
            const icon = document.getElementById(`icon-${id}`);
            icon.className = icon.className.includes('down') ? 'fa-solid fa-chevron-up' : 'fa-solid fa-chevron-down';
        };

        // --- INTEGRAÇÃO FIREBASE ---
        onSnapshot(query(collection(db, "pedidos"), orderBy("timestamps.criado_em", "asc")), (snapshot) => {
            const listColetas = document.getElementById('list-coletas');
            const listEntregas = document.getElementById('list-entregas');
            
            let htmlColetas = '', htmlEntregas = '';
            let countColeta = 0, countEntrega = 0;

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const safeStatus = order.status || '';
                
                if (safeStatus === 'preparando' || safeStatus === 'transporte') {
                    try {
                        const cardHtml = generateDriverCard(docSnap.id, order, safeStatus);
                        if (safeStatus === 'preparando') { htmlColetas += cardHtml; countColeta++; }
                        if (safeStatus === 'transporte') { htmlEntregas += cardHtml; countEntrega++; }
                    } catch (err) { console.warn("Pedido corrompido isolado no app do motorista:", docSnap.id); }
                }
            });

            // Atualiza UI
            listColetas.innerHTML = countColeta > 0 ? htmlColetas : `<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>Nenhum pedido aguardando coleta.</p></div>`;
            listEntregas.innerHTML = countEntrega > 0 ? htmlEntregas : `<div class="empty-state"><i class="fa-solid fa-map-location-dot"></i><p>Nenhuma entrega em andamento.</p></div>`;
            
            document.getElementById('count-coleta').innerText = countColeta;
            document.getElementById('count-entrega').innerText = countEntrega;
            
            const badgeColeta = document.getElementById('badge-coleta');
            badgeColeta.innerText = countColeta;
            badgeColeta.style.display = countColeta > 0 ? 'block' : 'none';

            const badgeEntrega = document.getElementById('badge-entrega');
            badgeEntrega.innerText = countEntrega;
            badgeEntrega.style.display = countEntrega > 0 ? 'block' : 'none';
        });

        function generateDriverCard(id, order, status) {
            const numCurto = order.numero_curto || id.slice(0,4);
            const ts = order.timestamps?.criado_em ? new Date(order.timestamps.criado_em) : new Date();
            const timeStr = ts.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const lat = order.coordenadas?.lat;
            const lng = order.coordenadas?.lng;
            const end = order.endereco || {};
            const endFull = `${end.rua || 'Rua não informada'}, ${end.numero || 'S/N'} - ${end.bairro || ''}`;
            
            // Lógica Financeira (Crucial para o Motorista)
            const metodo = order.pagamento?.metodo || 'Dinheiro';
            const val = (Number(order.pagamento?.valor_total) || 0).toFixed(2);
            const isPix = metodo.toUpperCase() === 'PIX';
            
            let payBox = '';
            if (isPix) {
                payBox = `<div class="payment-box paid"><div style="display:flex; align-items:center; gap:8px;"><i class="fa-brands fa-pix"></i> Já Pago (PIX)</div> <div class="pay-val">Liberado</div></div>`;
            } else {
                payBox = `<div class="payment-box collect"><div style="display:flex; flex-direction:column; font-size:0.8rem;"><span>COBRAR NA ENTREGA</span><span style="font-weight:400;">(${metodo})</span></div> <div class="pay-val">R$ ${val}</div></div>`;
            }

            // Itens do Pedido (Ocultos por padrão)
            let itensHtml = '';
            let totalItens = 0;
            if (order.itens && Array.isArray(order.itens)) {
                totalItens = order.itens.length;
                itensHtml = order.itens.map(i => {
                    const obs = i.observacao ? `<br><span style="color: var(--danger); font-size: 0.8rem; font-weight:600;">+ ${i.observacao}</span>` : '';
                    return `<li><b>${i.quantidade || 1}x ${i.nome || 'Item'}</b>${obs}</li>`;
                }).join('');
            }

            // Links de Rotas
            const linkMaps = (lat && lng) ? `https://www.google.com/maps/search/?api=1&query=${lat},${lng}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endFull+', Duque de Caxias')}`;
            const linkWaze = (lat && lng) ? `https://waze.com/ul?ll=${lat},${lng}&navigate=yes` : `https://waze.com/ul?q=${encodeURIComponent(endFull+', Duque de Caxias')}`;
            const linkWpp = `https://wa.me/55${(order.cliente?.telefone || '').replace(/\D/g, '')}`;

            // Botão Principal
            let mainAction = '';
            let roteirizacaoHtml = '';

            if (status === 'preparando') {
                mainAction = `<button class="btn btn-primary" onclick="updateStatus('${id}', 'transporte')"><i class="fa-solid fa-motorcycle"></i> Iniciar Entrega</button>`;
            } else if (status === 'transporte') {
                roteirizacaoHtml = `
                    <div class="action-grid">
                        <a href="${linkMaps}" target="_blank" class="btn-icon"><i class="fa-solid fa-map-location-dot"></i> Maps</a>
                        <a href="${linkWaze}" target="_blank" class="btn-icon"><i class="fa-brands fa-waze"></i> Waze</a>
                        <a href="${linkWpp}" target="_blank" class="btn-icon"><i class="fa-brands fa-whatsapp"></i> Chat</a>
                    </div>`;
                mainAction = `<button class="btn btn-success" onclick="confirmarEntrega('${id}', ${isPix}, '${val}')"><i class="fa-solid fa-check-double"></i> Confirmar Entrega</button>`;
            }

            return `
                <div class="driver-card">
                    <div class="card-header">
                        <span class="order-id">#${numCurto}</span>
                        <span class="order-time"><i class="fa-regular fa-clock"></i> ${timeStr}</span>
                    </div>
                    
                    <div class="client-info">
                        <div class="client-name">${order.cliente?.nome || 'Cliente não identificado'}</div>
                        <div class="client-address">${endFull}</div>
                    </div>

                    ${payBox}
                    ${roteirizacaoHtml}
                    ${mainAction}

                    <button class="items-toggle" onclick="toggleItems('${id}')">
                        <span>Ver Resumo do Pedido (${totalItens} itens)</span>
                        <i id="icon-${id}" class="fa-solid fa-chevron-down"></i>
                    </button>
                    <ul class="items-list" id="items-${id}">
                        ${itensHtml}
                    </ul>
                </div>
            `;
        }

        window.updateStatus = async (id, novoStatus) => {
            try { await updateDoc(doc(db, "pedidos", id), { status: novoStatus }); } 
            catch (e) { alert("Erro ao atualizar o pedido. Verifique a internet."); }
        };

        window.confirmarEntrega = (id, isPix, valor) => {
            let msg = isPix ? "Confirma que a entrega foi realizada? (Já está pago via PIX)" : `Atenção: Você cobrou os R$ ${valor} do cliente?\n\nConfirme apenas se já recebeu o pagamento.`;
            if (confirm(msg)) {
                updateStatus(id, 'entregue');
            }
        };
    </script>
</body>
</html>
